name: Node.js CI (Vitest)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Instalar o Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22' # Versão estável do Node
        cache: 'npm'

    - name: Instalar dependências limpas
      run: npm ci

    - name: Rodar os testes do Vitest
      run: npm test
      env:
        # Passa as variáveis para os testes se eles precisarem do Turso
        TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
        TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}