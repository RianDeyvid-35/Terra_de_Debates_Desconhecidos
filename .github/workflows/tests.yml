name: Node.js CI (Vitest)

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o codigo do repositorio
        uses: actions/checkout@v4

      - name: Instalar o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependencias
        run: npm install

      - name: Rodar os testes do Vitest
        env:
          NODE_ENV: test
          DB_DIALECT: sqlite
          DB_STORAGE: :memory:
          JWT_SECRET: chave_secreta_ambiente_ci_vitest
        run: npm test